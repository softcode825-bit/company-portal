services:
  - type: web
    name: midwest-vg-portal
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && pip install gunicorn"
    startCommand: "cd backend && gunicorn -b 0.0.0.0:$PORT app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: company-portal-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: company-portal-db
    databaseName: company_portal
    user: portal_admin
    plan: free
