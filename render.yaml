services:
  - type: web
    name: midwest-vg-portal
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn -w 1 -b 0.0.0.0:$PORT backend.app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: company-portal-db
    databaseName: company_portal
    user: portal_admin
    plan: free
