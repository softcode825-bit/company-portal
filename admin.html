<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Debug Version</title>
    <script>
        console.log("Admin panel loading...");
        
        function adminLogin() {
            console.log("Login clicked");
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            console.log("Username:", username);
            console.log("Password:", password ? "***" : "empty");
            
            if (username === 'admin' && password === 'admin2026') {
                console.log("Login successful!");
                showDashboard();
            } else {
                console.log("Login failed");
                alert('Invalid credentials. Use admin/admin2026');
            }
        }
        
        function showDashboard() {
            console.log("showDashboard called");
            
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            
            console.log("loginSection:", loginSection);
            console.log("dashboardSection:", dashboardSection);
            
            if (loginSection) {
                loginSection.style.display = 'none';
                console.log("Login hidden");
            }
            
            if (dashboardSection) {
                dashboardSection.style.display = 'block';
                console.log("Dashboard shown");
            }
            
            loadData();
        }
        
        function loadData() {
            console.log("loadData called");
            
            const companies = [
                {name: 'Kishan Inc.', license: '121006834', vgt: 6, email: 'jpatel4233@gmail.com'},
                {name: 'BAR NIGHTCLUB LLC', license: '120711930', vgt: 6, email: 'N/A'},
                {name: 'JALARAM INC.', license: '140701527', vgt: 6, email: 'N/A'},
                {name: 'MIRA\'S GAMING CAFE ,LLC', license: '230701003', vgt: 6, email: 'N/A'},
            ];
            
            // Update stats
            document.getElementById('totalCompanies').textContent = '13';
            document.getElementById('totalReports').textContent = '14';
            
            // Fill table
            const tbody = document.getElementById('companiesTable');
            tbody.innerHTML = '';
            
            companies.forEach(c => {
                const row = `<tr>
                    <td>${c.name}</td>
                    <td>${c.license}</td>
                    <td>${c.vgt}</td>
                    <td>${c.email}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
            
            console.log("Data loaded successfully");
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .content {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #34495e;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #2c3e50;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 ADMIN PANEL - DEBUG</h1>
            <p>Midwest VG Solutions</p>
        </div>
        
        <div class="content">
            <!-- Login Section -->
            <div id="loginSection" style="max-width: 400px; margin: 0 auto;">
                <h2>Admin Login</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="adminUsername" value="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" value="admin2026">
                </div>
                <button class="btn" onclick="adminLogin()">Login</button>
                <p style="text-align: center; margin-top: 15px; color: #666; font-size: 12px;">
                    Default: admin / admin2026
                </p>
            </div>
            
            <!-- Dashboard Section -->
            <div id="dashboardSection" style="display: none;">
                <h2>Dashboard</h2>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Total Companies</div>
                        <div class="stat-value" id="totalCompanies">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Reports</div>
                        <div class="stat-value" id="totalReports">0</div>
                    </div>
                </div>
                
                <h3>All Companies</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Company Name</th>
                            <th>License Number</th>
                            <th>VGT Count</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="companiesTable">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
                
                <button class="btn" onclick="location.reload()" style="margin-top: 20px; width: auto; padding: 10px 30px;">Logout</button>
            </div>
        </div>
    </div>
    
    <script>
        console.log("Page fully loaded");
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                console.log("Enter key pressed");
                adminLogin();
            }
        });
    </script>
</body>
</html>
